<div class="entry-form-container" mat-dialog-content>
  <h2 mat-dialog-title>{{ isEditMode ? 'Edit Tenant' : 'Create New Tenant' }}</h2>
  
  <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Tenant Name*</label>
      <input type="text" id="name" formControlName="name" placeholder="Enter tenant name" />
      <div class="error" *ngIf="entryForm.get('name')?.touched && entryForm.get('name')?.hasError('required')">
        Name is required
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="startDate">Start Date*</label>
        <input type="date" id="startDate" formControlName="startDate" />
        <div class="error" *ngIf="entryForm.get('startDate')?.touched && entryForm.get('startDate')?.hasError('required')">
          Start date is required
        </div>
      </div>

      <div class="form-group">
        <label for="endDate">End Date*</label>
        <input type="date" id="endDate" formControlName="endDate" />
        <div class="error" *ngIf="entryForm.get('endDate')?.touched && entryForm.get('endDate')?.hasError('required')">
          End date is required
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="address">Full Address</label>
      <textarea id="address" formControlName="address" placeholder="Enter tenant's full residential address" rows="2"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="aadhaarNumber">Aadhaar Number</label>
        <input type="text" id="aadhaarNumber" formControlName="aadhaarNumber" placeholder="12-digit Aadhaar number" maxlength="12" />
        <div class="error" *ngIf="entryForm.get('aadhaarNumber')?.touched && entryForm.get('aadhaarNumber')?.hasError('pattern')">
          Aadhaar must be exactly 12 digits
        </div>
      </div>

      <div class="form-group">
        <label for="propertyName">Property Name/ID</label>
        <input type="text" id="propertyName" formControlName="propertyName" placeholder="e.g. Apt 4B, Main St" />
      </div>
    </div>

    <div class="error" *ngIf="(entryForm.get('startDate')?.touched || entryForm.get('endDate')?.touched) && entryForm.hasError('startDateAfterOrEqualEndDate')">
      Start date must be earlier than end date
    </div>
    <div class="error" *ngIf="(entryForm.get('startDate')?.touched || entryForm.get('endDate')?.touched) && entryForm.hasError('rentPeriodTooShort')">
      Rent period must be at least 30 days (1 month)
    </div>

    <div class="form-actions" mat-dialog-actions>
      <button type="button" class="cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" [disabled]="entryForm.invalid">{{ isEditMode ? 'Save Changes' : 'Create' }}</button>
    </div>
  </form>
</div>
